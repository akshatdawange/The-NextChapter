<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profile - Step 2</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

  <main class="page-shell">
    <section class="wizard-card fade-in-up">

      <div class="progress-header">
        <p class="step-label">Step 2 of 2</p>
        <div class="progress-bar">
          <div class="progress-fill" style="width: 100%;"></div>
        </div>
      </div>

      <form id="step2Form" method="POST" novalidate>
        <input type="hidden" name="goal" id="goalInput" value="{{ profile_data.get('goal', '') }}">

        <div class="question-step active">
          <h1 class="form-title">What are you most trying to figure out right now?</h1>
          <p class="form-subtitle">Choose one option to guide your next pathways.</p>

          <div class="field-shell">
            <div class="goal-tile-group">
              <button type="button" class="goal-tile" data-value="Move out of home">
                <span class="goal-title">Move out of home</span>
                <span class="goal-desc">Am I ready financially to leave home?</span>
              </button>

              <button type="button" class="goal-tile" data-value="Save more money">
                <span class="goal-title">Save more money</span>
                <span class="goal-desc">How can I improve my monthly surplus?</span>
              </button>

              <button type="button" class="goal-tile" data-value="Understand my options">
                <span class="goal-title">Understand my options</span>
                <span class="goal-desc">What does each life path look like?</span>
              </button>
            </div>
          </div>

          {% if goal_error %}
          <div class="form-error-box">
            <span class="warning-icon">⚠</span>
            <span>{{ goal_error }}</span>
          </div>
          {% endif %}
        </div>

        <div class="form-actions step-2-actions">
          <a href="{{ url_for('main.quick_profile') }}" class="secondary-button step-link-btn">Back</a>
          <button type="submit" class="cta-button primary-button">Build My Pathways</button>
        </div>
      </form>
    </section>
  </main>

  <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
